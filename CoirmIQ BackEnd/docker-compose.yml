services:
  db:
    image: postgres:17-alpine
    container_name: ticket-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ticket_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticket_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticket-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      # Database Environment Mapping
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ticket_db
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ticket_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      # Redis Environment Mapping
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Security Token Keys
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: 86400000

      # Google OAuth2 Credentials Configuration
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OAUTH2_REDIRECT_URI: ${OAUTH2_REDIRECT_URI}

      # Cloudinary API Credentials Configuration
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./local-logs:/app/logs

volumes:
  postgres_data:
  redis_data: